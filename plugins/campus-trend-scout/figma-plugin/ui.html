<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  h1 {
    font-size: 13px;
    margin: 0;
  }
  p {
    margin: 0;
    color: #666;
    line-height: 1.5;
  }
  textarea {
    width: 100%;
    height: 260px;
    box-sizing: border-box;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    resize: vertical;
  }
  input[type="file"] {
    font-size: 11px;
  }
  .row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  button {
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
  }
  button.primary {
    background: #6b4eff;
    color: #fff;
  }
  button.secondary {
    background: #fff;
    border-color: #ddd;
    color: #333;
  }
  #status {
    min-height: 16px;
    font-size: 11px;
  }
  #status.error { color: #d1234b; }
  #status.ok { color: #1a9e5c; }
</style>
</head>
<body>
  <h1>Campus Trend Scout — Card News Importer</h1>
  <p>
    <code>data/cardnews/{DATE}.json</code> 파일을 선택하거나 내용을 붙여넣으면
    슬라이드가 실제 Figma 레이어(프레임/텍스트/도형)로 생성됩니다.
  </p>
  <input type="file" id="file-input" accept="application/json,.json">
  <textarea id="json-input" placeholder='{"date": "...", "topics": [...] } 또는 단일 topic 객체를 붙여넣으세요'></textarea>
  <div id="status"></div>
  <div class="row">
    <button class="secondary" id="cancel-btn">닫기</button>
    <button class="primary" id="import-btn">Figma로 가져오기</button>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const jsonInput = document.getElementById('json-input');
    const status = document.getElementById('status');
    const importBtn = document.getElementById('import-btn');
    const cancelBtn = document.getElementById('cancel-btn');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        jsonInput.value = reader.result;
        status.textContent = `${file.name} 불러옴`;
        status.className = 'ok';
      };
      reader.onerror = () => {
        status.textContent = '파일을 읽지 못했습니다';
        status.className = 'error';
      };
      reader.readAsText(file);
    });

    importBtn.addEventListener('click', () => {
      const raw = jsonInput.value.trim();
      if (!raw) {
        status.textContent = 'JSON을 붙여넣거나 파일을 선택하세요';
        status.className = 'error';
        return;
      }
      try {
        JSON.parse(raw);
      } catch (e) {
        status.textContent = 'JSON 파싱 실패: ' + e.message;
        status.className = 'error';
        return;
      }
      status.textContent = '가져오는 중...';
      status.className = '';
      importBtn.disabled = true;
      parent.postMessage({ pluginMessage: { type: 'import', json: raw } }, '*');
    });

    cancelBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      importBtn.disabled = false;
      if (msg.type === 'done') {
        status.textContent = '완료! Figma 캔버스를 확인하세요.';
        status.className = 'ok';
      } else if (msg.type === 'error') {
        status.textContent = '오류: ' + msg.message;
        status.className = 'error';
      }
    };
  </script>
</body>
</html>
